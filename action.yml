name: 'Bheeshma — Runtime Supply Chain Security'
description: 'Catch npm supply-chain attacks at runtime. Detects credential theft, backdoors, and exfiltration static analysis misses.'

author: 'bb1nfosec'

categories:
  - Security
  - Continuous Integration

branding:
  icon: 'shield-check'
  color: 'red'

inputs:
  command:
    description: 'Command to monitor (e.g. "npm test", "npm ci", "node app.js")'
    required: true
  fail-level:
    description: 'Minimum risk level to fail the build. Options: critical, high, medium, low'
    required: false
    default: 'high'
  config:
    description: 'Path to .bheeshmarc.json config file'
    required: false
    default: ''
  sarif-output:
    description: 'Output path for SARIF results file'
    required: false
    default: 'bheeshma-results.sarif'
  skip-low:
    description: 'Skip LOW-risk signals in SARIF to reduce noise'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning for inline PR annotations'
    required: false
    default: 'true'
  enforce:
    description: 'Fail the build on any policy violation (same as --enforce flag)'
    required: false
    default: 'false'

outputs:
  sarif-file:
    description: 'Path to the generated SARIF file'
    value: ${{ inputs.sarif-output }}
  exit-code:
    description: 'Exit code from bheeshma (0 = clean, 1 = policy violation detected)'
    value: ${{ steps.bheeshma.outputs.exit-code }}
  findings:
    description: 'JSON summary of security findings'
    value: ${{ steps.bheeshma.outputs.findings }}

runs:
  using: 'composite'
  steps:
    - name: Run bheeshma runtime security monitor
      shell: bash
      id: bheeshma
      run: |
        # Use the checked-out action's own code (no global npm install needed).
        # We invoke bheeshma-ci.js directly because it is the CLI that parses
        # --fail-level / --no-skip-low and emits SARIF; the base `bheeshma` CLI
        # does not understand those flags.
        BHEESHMA_CLI="${{ github.action_path }}/bin/bheeshma-ci.js"

        ARGS=""
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi
        ARGS="$ARGS --fail-level ${{ inputs.fail-level }}"
        ARGS="$ARGS --output ${{ inputs.sarif-output }}"
        if [ "${{ inputs.skip-low }}" = "false" ]; then
          ARGS="$ARGS --no-skip-low"
        fi

        echo "::group::Bheeshma — Runtime Supply Chain Security Monitor"
        node "$BHEESHMA_CLI" $ARGS -- ${{ inputs.command }}
        BHEESHMA_EXIT=$?
        echo "::endgroup::"

        # bheeshma-ci always exits non-zero on a policy violation. When the
        # caller opts out of enforcement (enforce: false), report findings but
        # do not fail the build.
        if [ "${{ inputs.enforce }}" = "false" ] && [ "$BHEESHMA_EXIT" != "0" ]; then
          echo "::warning::[bheeshma] Policy violation detected (enforce=false, not failing build)"
          BHEESHMA_EXIT=0
        fi

        echo "exit-code=$BHEESHMA_EXIT" >> "$GITHUB_OUTPUT"
        echo "findings={\"exit_code\": $BHEESHMA_EXIT, \"sarif\": \"${{ inputs.sarif-output }}\"}" >> "$GITHUB_OUTPUT"
        exit $BHEESHMA_EXIT

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: bheeshma
