name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [14.x, 18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run unit/integration tests
        run: node test/harness.js

      - name: Run CLI integration tests
        run: node test/cli.test.js

      - name: Run efficacy benchmark
        run: node benchmark/run.js

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Self-monitoring test
        run: |
          echo "::group::Bheeshma monitoring itself"
          node bin/bheeshma.js -- node -e "console.log('hello')"
          echo "::endgroup::"

      - name: Check for secrets in history
        run: |
          if git log --all --full-history -- '*.js' '*.json' | grep -iE '(api_key|secret|password|token)\s*[:=]\s*["\x27][^"\x27]{8,}'; then
            echo "::warning::Potential secret found in git history"
          fi
