name: Update Wall of Shame Threat Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-threats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch threat data
        run: node scripts/fetch-threats.js

      - name: Commit updated data
        run: |
          git config user.name "bheeshma-bot[bot]"
          git config user.email "bheeshma-bot[bot]@users.noreply.github.com"
          git add dashboard/data/threats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update Wall of Shame threat data [skip ci]"
            git push
          fi
