name: 'Bheeshma Runtime Monitor'
description: 'Runtime dependency behavior monitor for npm packages — the strace for npm. Detects supply chain attacks that static analysis misses. Outputs SARIF for GitHub Code Scanning.'
author: 'bb1nfosec'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  command:
    description: 'Command to run under monitoring (e.g., "npm test", "node app.js")'
    required: true
  fail-level:
    description: 'Minimum risk level to fail the build'
    required: false
    default: 'critical'
  config:
    description: 'Path to .bheeshmarc.json config file'
    required: false
    default: ''
  sarif-output:
    description: 'Path for SARIF output file'
    required: false
    default: 'bheeshma-results.sarif'
  skip-low:
    description: 'Skip LOW-risk signals in SARIF output (reduces noise)'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run bheeshma monitoring
      shell: bash
      id: bheeshma
      run: |
        BHEESHMA_ROOT="${{ github.action_path }}/../../.."
        ARGS=""
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi
        ARGS="$ARGS --fail-level ${{ inputs.fail-level }}"
        ARGS="$ARGS --output ${{ inputs.sarif-output }}"
        if [ "${{ inputs.skip-low }}" = "false" ]; then
          ARGS="$ARGS --no-skip-low"
        fi

        echo "::group::Bheeshma — Runtime Dependency Monitor"
        node "$BHEESHMA_ROOT/bin/bheeshma-ci.js" $ARGS -- ${{ inputs.command }}
        BHEESHMA_EXIT=$?
        echo "::endgroup::"
        exit $BHEESHMA_EXIT

    - name: Upload SARIF results
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: bheeshma
