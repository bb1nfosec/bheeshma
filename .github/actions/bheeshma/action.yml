name: 'Bheeshma Runtime Security Monitor'
description: 'Catch npm supply-chain attacks at runtime — the strace for npm packages. Detects malicious postinstall scripts, credential theft, data exfiltration, backdoors, and obfuscated payloads that static analysis misses. Outputs SARIF for GitHub Code Scanning with inline PR annotations.'
author: 'bb1nfosec'

branding:
  icon: 'shield-check'
  color: 'red'

inputs:
  command:
    description: 'Command to run under bheeshma monitoring (e.g., "npm test", "npm ci", "node app.js")'
    required: true
  fail-level:
    description: 'Minimum risk level to fail the build (critical | high | medium | low)'
    required: false
    default: 'critical'
  config:
    description: 'Path to .bheeshmarc.json config file (optional)'
    required: false
    default: ''
  sarif-output:
    description: 'Path for SARIF output file'
    required: false
    default: 'bheeshma-results.sarif'
  skip-low:
    description: 'Skip LOW-risk signals in SARIF output to reduce noise'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning (shows inline annotations on PRs)'
    required: false
    default: 'true'

outputs:
  sarif-file:
    description: 'Path to the generated SARIF file'
    value: ${{ inputs.sarif-output }}
  exit-code:
    description: 'Exit code from bheeshma (0 = pass, 1 = policy violation)'
    value: ${{ steps.bheeshma.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Run bheeshma monitoring
      shell: bash
      id: bheeshma
      run: |
        BHEESHMA_ROOT="${{ github.action_path }}/../../.."
        ARGS=""
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi
        ARGS="$ARGS --fail-level ${{ inputs.fail-level }}"
        ARGS="$ARGS --output ${{ inputs.sarif-output }}"
        if [ "${{ inputs.skip-low }}" = "false" ]; then
          ARGS="$ARGS --no-skip-low"
        fi

        echo "::group::Bheeshma — Runtime Security Monitor"
        node "$BHEESHMA_ROOT/bin/bheeshma-ci.js" $ARGS -- ${{ inputs.command }}
        BHEESHMA_EXIT=$?
        echo "::endgroup::"
        echo "exit-code=$BHEESHMA_EXIT" >> "$GITHUB_OUTPUT"
        exit $BHEESHMA_EXIT

    - name: Upload SARIF results
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: bheeshma
